<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tambah Pegawai</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- CSS -->
<link rel="stylesheet" href="css/style.css">
</head>

<body>

<!-- HEADER -->
<header class="text-center py-3 bg-primary text-white">
Aplikasi Manajemen Pegawai
</header>

<!-- CONTAINER -->
<div class="container mt-4 d-flex">

<!-- SIDEBAR -->
<aside class="me-3">
<ul class="menu list-group">

<li>
<a href="dashboard.html" class="list-group-item">Dashboard</a>
</li>

<li>
<a href="tabel.html" class="list-group-item active">Data Pegawai</a>
</li>

<li>
<a href="login.html" class="list-group-item text-danger">Keluar</a>
</li>

</ul>
</aside>

<!-- MAIN -->
<section class="main flex-grow-1">

<h2 class="judul text-center mb-4">Tambah Pegawai</h2>

<form>

<div class="form-group mb-3">
<label>Foto</label>
<div class="input">
<input type="file" class="form-control">
</div>
</div>

<div class="form-group mb-3">
<label>Nama</label>
<div class="input">
<input type="text" class="form-control">
</div>
</div>

<div class="form-group mb-3">
<label>Jenis Kelamin</label><br>

<input type="radio" name="jk"> Laki-laki
<input type="radio" name="jk"> Perempuan

</div>

<div class="form-group mb-3">
<label>Tanggal</label>
<div class="input">
<input type="date" class="form-control">
</div>
</div>

<div class="form-group mb-3">
<label>Jabatan</label>
<div class="input">
<select class="form-select">
<option>Direktur</option>
<option>Manajer</option>
<option>Marketing</option>
<option>Sekretaris</option>
<option>Chef</option>
<option>Waiter</option>
<option>Kasir</option>
</select>
</div>
</div>

<div class="form-group mt-4">
<input type="submit" value="Simpan" class="tombol simpan btn btn-primary w-100 mb-2">
<input type="reset" value="Batal" class="tombol reset btn btn-secondary w-100">
</div>

</form>

</section>

</div>

<!-- FOOTER -->
<footer class="text-center mt-4 py-2 bg-light">
Copyright &copy; 2026
</footer>

</body>
</html>
